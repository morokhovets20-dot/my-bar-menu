<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js?1"></script>
    <script>
        // Принудительная инициализация
        window.Telegram.WebApp.ready();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 15px; padding-bottom: 120px; }
        .header { text-align: center; color: #c9a050; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        .grid-item { background: #161616; border: 1px solid #2a2a2a; padding: 25px 10px; border-radius: 15px; text-align: center; color: #c9a050; font-weight: bold; }
        .item { background: #161616; border-radius: 15px; margin-bottom: 10px; border: 1px solid #2a2a2a; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        button.btn { background: #c9a050; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; }
        #orderBtn { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #c9a050; padding: 18px; border-radius: 15px; font-weight: bold; display: none; border: none; color: black; z-index: 1000; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #161616; padding: 25px; border-radius: 20px; width: 80%; text-align: center; border: 1px solid #c9a050; }
    </style>
</head>
<body>
    <div class="header"><h3>Dym Rzeszów Shop 💨</h3></div>
    
    <div id="main-menu" class="main-grid">
        <div class="grid-item" onclick="openCat('ep')">🔋 Одноразки</div>
        <div class="grid-item" onclick="openCat('liq')">💧 Жижки</div>
    </div>

    <div id="catalog" style="display:none; margin-top: 20px;">
        <div class="item">
            <div><b>Тестовый товар</b><br>100zl</div>
            <div style="display:flex; align-items:center; gap:10px;">
                <button class="btn" onclick="change(1)">+</button>
                <span id="cnt">0</span>
            </div>
        </div>
    </div>

    <button id="orderBtn" onclick="document.getElementById('modal').style.display='flex'">Оформить</button>

    <div id="modal" class="modal">
        <div class="modal-content">
            <button style="width:100%;padding:15px;background:#c9a050;border-radius:10px;border:none;font-weight:bold;" onclick="send('Доставка')">🚚 Доставка</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        let count = 0;

        function openCat(c) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('catalog').style.display = 'block';
        }

        function change(d) {
            count += d;
            document.getElementById('cnt').innerText = count;
            document.getElementById('orderBtn').style.display = count > 0 ? 'block' : 'none';
        }

        function send(m) {
            const data = [{name: "Тест", count: count, method: m}];
            console.log("Отправка:", data);
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
