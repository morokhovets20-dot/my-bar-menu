<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <style>
        body { font-family: sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 15px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .card { background: #161616; border: 1px solid #2a2a2a; padding: 20px; border-radius: 12px; text-align: center; color: #c9a050; }
        .item { background: #161616; padding: 15px; border-radius: 12px; margin-top: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #2a2a2a; }
        button { background: #c9a050; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; }
    </style>
</head>
<body>
    <h3 style="text-align:center; color:#c9a050;">Dym Rzeszów Shop</h3>
    <div id="menu" class="grid">
        <div class="card" onclick="showCat()">🔋 Одноразки</div>
        <div class="card" onclick="showCat()">💧 Жижки</div>
    </div>

    <div id="cat" style="display:none;">
        <div class="item">
            <span>Тест товар (100zl)</span>
            <button onclick="add()">Добавить</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let count = 0;

        // Показываем кнопку "Заказать" внизу экрана (интерфейс Telegram)
        tg.MainButton.setText("ОФОРМИТЬ ЗАКАЗ");
        tg.MainButton.textColor = "#000000";
        tg.MainButton.color = "#c9a050";

        function showCat() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('cat').style.display = 'block';
        }

        function add() {
            count++;
            tg.MainButton.show(); // Показываем главную кнопку Telegram
        }

        // Когда нажали на желтую кнопку внизу экрана
        tg.onEvent('mainButtonClicked', function(){
            let data = [{name: "Тестовый товар", count: count, method: "Доставка"}];
            tg.sendData(JSON.stringify(data));
        });
    </script>
</body>
</html>
