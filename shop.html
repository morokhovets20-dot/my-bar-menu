<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
    body { font-family: sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 15px; padding-bottom: 120px; }
    .header { text-align: center; color: #c9a050; margin-bottom: 15px; text-transform: uppercase; }
    .search-box { width: 100%; padding: 14px; border-radius: 12px; border: 1px solid #2a2a2a; background: #161616; color: white; margin-bottom: 15px; box-sizing: border-box; outline: none; }
    .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .grid-item { background: #161616; border: 1px solid #2a2a2a; padding: 25px 10px; border-radius: 15px; text-align: center; color: #c9a050; font-weight: bold; }
    .grid-item span { display: block; font-size: 24px; margin-bottom: 8px; }
    .back-btn { display: none; background: none; border: none; color: #c9a050; font-size: 16px; margin-bottom: 15px; padding: 10px 0; }
    #catalog { display: none; }
    .item { background: #161616; border-radius: 15px; margin-bottom: 10px; border: 1px solid #2a2a2a; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    .info b { color: #c9a050; display: block; font-size: 16px; }
    .info span { color: #888; font-size: 13px; }
    .controls { display: flex; align-items: center; gap: 12px; }
    button.btn { background: #c9a050; border: none; width: 32px; height: 32px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .m-btn { background: #2a2a2a; color: white; }
    #orderBtn { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #c9a050; padding: 18px; border-radius: 15px; font-weight: bold; display: none; border: none; color: black; z-index: 1000; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; }
    .modal-content { background: #161616; padding: 25px; border-radius: 20px; width: 80%; text-align: center; border: 1px solid #c9a050; }
</style></head><body>
    <div class="header"><h3>Dym Rzeszów Shop 💨</h3></div>
    <input type="text" id="search" class="search-box" placeholder="Поиск..." oninput="handleSearch(this.value)">
    <div id="main-menu" class="main-grid">
        <div class="grid-item" onclick="openCat('tob_strong')"><span>🔥</span>Табак (Крепкий)</div>
        <div class="grid-item" onclick="openCat('tob_light')"><span>☁️</span>Табак (Легкий)</div>
        <div class="grid-item" onclick="openCat('ep')"><span>🔋</span>Одноразки</div>
        <div class="grid-item" onclick="openCat('liq')"><span>💧</span>Жижки</div>
        <div class="grid-item" onclick="openCat('pods')"><span>📟</span>Поды</div>
        <div class="grid-item" onclick="openCat('carts')"><span>⚙️</span>Картриджи</div>
    </div>
    <button id="back" class="back-btn" onclick="showMain()">← Назад</button>
    <div id="catalog"></div>
    <button id="orderBtn" onclick="openModal()">Подтвердить заказ</button>
    <div id="deliveryModal" class="modal"><div class="modal-content">
        <h3 style="color:#c9a050">Способ получения</h3>
        <button style="width:100%;padding:15px;margin:10px 0;background:#c9a050;border-radius:10px;border:none;font-weight:bold;" onclick="finish('Доставка')">🚚 Доставка</button>
        <button style="width:100%;padding:15px;margin:10px 0;background:#2a2a2a;color:white;border-radius:10px;border:none;font-weight:bold;" onclick="finish('Самовывоз')">🏃 Самовывоз</button>
    </div></div>
    <script>
        let tg = window.Telegram.WebApp; tg.expand(); let cart = {};
        // ВАЖНО: Ниже должен быть список твоих 281 товаров. 
        // Если ты запустишь update_menu.py, он САМ вставит их сюда.
        // Пока я вставлю пару для теста.
        const products = [
            {id: '1', cat: 'tob_strong', name: '420 Forest', desc: 'Banana | Крепкий', price: 70},
            {id: '2', cat: 'ep', name: 'Elfbar', desc: 'Watermelon', price: 120}
        ];
        const catDiv = document.getElementById('catalog');
        products.forEach(p => {
            catDiv.innerHTML += `<div class="item" data-cat="${p.cat}" data-name="${p.name} ${p.desc}">
                <div class="info"><b>${p.name}</b><span>${p.desc}</span><div style="font-weight:bold">${p.price}zl</div></div>
                <div class="controls">
                    <button class="btn m-btn" onclick="change('${p.name}', ${p.price}, -1)">-</button>
                    <span id="cnt-${p.name}">0</span>
                    <button class="btn" onclick="change('${p.name}', ${p.price}, 1)">+</button>
                </div></div>`;
        });
        function openCat(cat) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('catalog').style.display = 'block';
            document.getElementById('back').style.display = 'block';
            document.querySelectorAll('.item').forEach(i => i.style.display = i.dataset.cat === cat ? 'flex' : 'none');
        }
        function showMain() {
            document.getElementById('main-menu').style.display = 'grid';
            document.getElementById('catalog').style.display = 'none';
            document.getElementById('back').style.display = 'none';
        }
        function handleSearch(v) {
            if(v.length > 0) { openCat('all'); document.querySelectorAll('.item').forEach(i => i.style.display = i.dataset.name.toLowerCase().includes(v.toLowerCase()) ? 'flex' : 'none'); }
            else { showMain(); }
        }
        function change(n, p, d) {
            cart[n] = (cart[n] || 0) + d;
            if(cart[n] <= 0) delete cart[n];
            document.getElementById('cnt-'+n).innerText = cart[n] || 0;
            let total = Object.values(cart).reduce((a, b) => a + b, 0);
            document.getElementById('orderBtn').style.display = total > 0 ? 'block' : 'none';
            document.getElementById('orderBtn').innerText = `Заказать (${total} шт.)`;
        }
        function openModal() { document.getElementById('deliveryModal').style.display = 'flex'; }
        function finish(m) {
            let data = Object.keys(cart).map(k => ({name: k, count: cart[k], method: m}));
            tg.sendData(JSON.stringify(data));
            tg.showPopup({title: 'Успех', message: 'Заказ принят!', buttons: [{type: 'ok'}]}, () => tg.close());
        }
    </script></body></html>
