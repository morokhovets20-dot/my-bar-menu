<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding: 15px; }
        h2 { text-align: center; color: #ffd700; margin-bottom: 20px; }
        
        .item { 
            background: #1e1e1e; 
            border-radius: 15px; 
            margin-bottom: 15px; 
            overflow: hidden; /* Чтобы картинка не вылезала за углы */
            border: 1px solid #333;
        }
        
        .item img { 
            width: 100%; 
            height: 150px; 
            object-fit: cover; /* Картинка заполнит блок красиво */
        }
        
        .item-content { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        
        .info b { font-size: 18px; color: #fff; display: block; }
        .info span { color: #ffd700; font-weight: bold; }
        
        button { 
            background: #ffd700; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 10px; 
            font-weight: bold; 
            color: #000;
            cursor: pointer;
        }
        
        #orderBtn { 
            position: fixed; 
            bottom: 20px; 
            left: 5%; 
            width: 90%; 
            background: #28a745; 
            padding: 15px; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: bold;
            display: none; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <h2>Smaki Bar Menu 🍕</h2>
    
    <div class="item">
        <img src="https://i.imgur.com/8B6p6yX.jpg" alt="Пицца">
        <div class="item-content">
            <div class="info"><b>Пицца Маргарита</b><span>550₽</span></div>
            <button onclick="add('Маргарита', 550)">+</button>
        </div>
    </div>

    <div class="item">
        <img src="https://i.imgur.com/k98IqKj.jpg" alt="Роллы">
        <div class="item-content">
            <div class="info"><b>Филадельфия</b><span>480₽</span></div>
            <button onclick="add('Филадельфия', 480)">+</button>
        </div>
    </div>

    <button id="orderBtn" onclick="send()">Заказать</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function add(name, price) {
            cart.push({name: name, price: price});
            let btn = document.getElementById('orderBtn');
            btn.style.display = 'block';
            btn.innerText = `Оформить заказ (${cart.length})`;
        }

        function send() {
            if (cart.length > 0) {
                tg.sendData(JSON.stringify(cart));
                tg.close();
            }
        }
    </script>
</body>
</html>
