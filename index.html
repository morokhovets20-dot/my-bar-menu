<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1c1c1c; color: white; margin: 0; padding: 20px; padding-top: 20px; }
        .item { background: #2b2b2b; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        button { background: #ffd700; border: none; padding: 10px 15px; border-radius: 10px; font-weight: bold; }
        #orderBtn { position: fixed; bottom: 20px; left: 10%; width: 80%; background: #28a745; padding: 15px; color: white; border: none; border-radius: 10px; display: none; }
    </style>
</head>
<body>
    <h2 style="text-align:center; color:#ffd700;">Smaki Bar Menu 🍕</h2>
    
    <div class="item">
        <div><b>Маргарита</b><br>550₽</div>
        <button onclick="add('Маргарита', 550)">+</button>
    </div>

    <div class="item">
        <div><b>Филадельфия</b><br>480₽</div>
        <button onclick="add('Филадельфия', 480)">+</button>
    </div>

    <button id="orderBtn" onclick="send()">Заказать</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function add(name, price) {
            cart.push({name: name, price: price});
            document.getElementById('orderBtn').style.display = 'block';
            document.getElementById('orderBtn').innerText = `Заказать (${cart.length})`;
        }

        function send() {
            if (cart.length > 0) {
                tg.sendData(JSON.stringify(cart)); // Отправляем данные боту
                tg.close(); // Закрываем окно
            }
        }
    </script>
</body>
</html>
