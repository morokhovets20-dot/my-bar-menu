<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #0f0f0f; color: white; margin: 0; padding: 15px; }
        .header { text-align: center; color: #c9a050; margin-bottom: 20px; }
        .item { background: #1a1a1a; border-radius: 15px; margin-bottom: 15px; overflow: hidden; border: 1px solid #2a2a2a; }
        .item img { width: 100%; height: 180px; object-fit: cover; }
        .content { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .info b { color: #c9a050; font-size: 18px; display: block; }
        button { background: #c9a050; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; color: black; }
        #orderBtn { position: fixed; bottom: 20px; left: 5%; width: 90%; background: #c9a050; padding: 15px; border-radius: 10px; font-weight: bold; display: none; border: none; color: black; }
    </style>
</head>
<body>
    <div class="header"><h2>Dym Rzeszów Shop 💨</h2></div>
    
   <div class="item">
        <img src="https://images.pexels.com/photos/4198139/pexels-photo-4198139.jpeg?auto=compress&cs=tinysrgb&w=500" alt="Кальян">
        <div class="content">
            <div class="info"><b>Alpha Hookah X</b><br>9 500₽</div>
            <button onclick="add('Alpha Hookah X', 9500)">+</button>
        </div>
    </div>

    <div class="item">
        <img src="https://images.pexels.com/photos/4198133/pexels-photo-4198133.jpeg?auto=compress&cs=tinysrgb&w=500" alt="Табак">
        <div class="content">
            <div class="info"><b>Darkside Core</b><br>850₽</div>
            <button onclick="add('Darkside Core', 850)">+</button>
        </div>
    </div>

    <button id="orderBtn" onclick="send()">Заказать</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        let cart = [];

        function add(name, price) {
            cart.push({name: name, price: price});
            document.getElementById('orderBtn').style.display = 'block';
            document.getElementById('orderBtn').innerText = `Оформить заказ (${cart.length})`;
        }

        function send() {
            if (cart.length > 0) {
                tg.sendData(JSON.stringify(cart));
                tg.close();
            }
        }
    </script>
</body>
</html>
